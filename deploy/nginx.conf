# Glenn's Plumbing — Nginx site config
# Copy lên VPS: sudo cp deploy/nginx.conf /etc/nginx/sites-available/glenns
#               sudo ln -s /etc/nginx/sites-available/glenns /etc/nginx/sites-enabled/
#               sudo nginx -t && sudo systemctl reload nginx
# Sau đó bật HTTPS: sudo certbot --nginx -d tenmien.com -d www.tenmien.com
#
# ĐỔI 2 chỗ: server_name  và  root (đường dẫn tới frontend/dist)

server {
    listen 80;
    listen [::]:80;
    server_name tenmien.com www.tenmien.com;   # <-- ĐỔI domain của bạn

    root /var/www/glenns/frontend/dist;          # <-- ĐỔI nếu clone ở nơi khác
    index index.html;

    # Bảo mật + nén cơ bản
    server_tokens off;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Gọi API → backend Express (cùng origin, không cần CORS)
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache file tĩnh có hash (Vite đặt hash trong tên file → cache vĩnh viễn an toàn)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: mọi route khác trả index.html cho React Router xử lý
    location / {
        try_files $uri $uri/ /index.html;
    }
}
